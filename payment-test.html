<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Arthiva Payment Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
      background: #f7f4ec;
      color: #17231c;
    }

    button {
      padding: 18px 30px;
      background: #173f2a;
      color: white;
      border: 0;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    pre {
      margin-top: 30px;
      padding: 25px;
      background: white;
      border: 1px solid #ddd;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>Arthiva Payment Verification Test</h1>

  <p>
    This page tests Arthiva's shared Razorpay payment system.
  </p>

  <br>

  <button id="paymentButton">
    Test ₹199 Razorpay Payment
  </button>

  <pre id="result">Waiting for test...</pre>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script>
    const paymentButton =
      document.getElementById("paymentButton");

    const result =
      document.getElementById("result");

    paymentButton.addEventListener(
      "click",
      startPayment
    );

    async function startPayment() {
      paymentButton.disabled = true;

      result.textContent =
        "Creating Razorpay test order...";

      try {
        const orderResponse = await fetch(
          "/api/create-payment",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              product: "ctc-reality",
              offer: "salary-report",
              market: "india"
            })
          }
        );

        const orderData =
          await orderResponse.json();

        if (
          !orderResponse.ok ||
          !orderData.success
        ) {
          throw new Error(
            orderData.error ||
            "Unable to create payment."
          );
        }

        result.textContent =
          "Order created.\nOpening Razorpay Checkout...";

        const options = {
          key: orderData.razorpayKeyId,
          amount: orderData.amount,
          currency: orderData.currency,
          name: "Arthiva Labs",
          description: orderData.offerName,
          order_id: orderData.orderId,

          handler: async function (
            paymentResponse
          ) {
            result.textContent =
              "Razorpay returned payment.\n" +
              "Asking Arthiva security guard to verify...";

            try {
              const verifyResponse = await fetch(
                "/api/verify-payment",
                {
                  method: "POST",
                  headers: {
                    "Content-Type":
                      "application/json"
                  },
                  body: JSON.stringify({
                    orderId:
                      paymentResponse.razorpay_order_id,

                    paymentId:
                      paymentResponse.razorpay_payment_id,

                    signature:
                      paymentResponse.razorpay_signature
                  })
                }
              );

              const verifyData =
                await verifyResponse.json();

              if (
                !verifyResponse.ok ||
                !verifyData.verified
              ) {
                throw new Error(
                  verifyData.error ||
                  "Payment verification failed."
                );
              }

              result.textContent =
                "PAYMENT VERIFIED ✅\n\n" +
                "Arthiva security guard approved the payment.\n\n" +
                "Status: " +
                verifyData.status +
                "\n\n" +
                "Payment ID: " +
                verifyData.paymentId;

            } catch (verificationError) {
              result.textContent =
                "PAYMENT NOT VERIFIED ❌\n\n" +
                verificationError.message;
            }
          },

          modal: {
            ondismiss: function () {
              result.textContent =
                "Razorpay Checkout was closed.";
            }
          },

          notes: {
            product: orderData.product,
            offer: orderData.offer
          }
        };

        const razorpay =
          new Razorpay(options);

        razorpay.on(
          "payment.failed",
          function (failureResponse) {
            result.textContent =
              "TEST PAYMENT FAILED.\n\n" +
              JSON.stringify(
                failureResponse.error,
                null,
                2
              );
          }
        );

        razorpay.open();

      } catch (error) {
        result.textContent =
          "TEST FAILED: " + error.message;
      } finally {
        paymentButton.disabled = false;
      }
    }
  </script>

</body>
</html>
